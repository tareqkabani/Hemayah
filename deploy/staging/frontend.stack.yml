# ============================================================
# Portainer Stack — سيرفر الواجهات (https عبر اسم نطاق)
# Stacks ← Add stack ← Repository:
#   Repository URL: https://github.com/tareqkabani/Hemayah
#   Compose path:   deploy/staging/frontend.stack.yml
#
# المتغيّرات المطلوبة (حقول env في Portainer):
#   PUBLIC_HOST   اسم النطاق للمستخدمين، مثل: hemayah.pp.gov.sa
#   FRONT_HOST / DB_HOST / API_HOST / SUPABASE_ANON_KEY /
#   SUPABASE_SERVICE_ROLE_KEY / NAFATH_BRIDGE_PASSWORD
# اختياريان (شهادة TLS من الجهة، base64 بسطر واحد؛ وإلا تُولَّد ذاتية التوقيع):
#   TLS_CERT_B64 / TLS_KEY_B64
#
# الوكيل يخدم https على 443 (و80 يحوّل إليه)، ويمرّر /supabase/
# لقاعدة Supabase عبر النطاق نفسه تفادياً لحجب المحتوى المختلط.
# ============================================================
services:
  hemaya-frontend:
    build:
      context: ../..
      dockerfile: deploy/staging/docker/frontend.Dockerfile
      args:
        # الوضع المباشر بالـIP (نمط 15 يوليو الشغّال) — روابط القاعدة والبوابة
        # تُخبز وقت البناء، والنطاق https معطَّل حتى يفعّل فريق الشبكة سجلّ DNS.
        # عند التفعيل: أعد الأسطر الثلاثة إلى صيغة النطاق ثم Pull and redeploy:
        #   NEXT_PUBLIC_SUPABASE_URL: "https://${PUBLIC_HOST}/supabase"
        #   NEXT_PUBLIC_GATEWAY_URL:  "https://${PUBLIC_HOST}"
        NEXT_PUBLIC_SUPABASE_URL: "http://${DB_HOST}:55321"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}"
        NEXT_PUBLIC_GATEWAY_URL: "http://${FRONT_HOST}:3000"
    ports:
      - "3000:3000"
    environment:
      # جانب الخادم يصل القاعدة داخلياً مباشرة (لا يمرّ بالوكيل)
      NEXT_PUBLIC_SUPABASE_URL: "http://${DB_HOST}:55321"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      NEXT_PUBLIC_GATEWAY_URL: "http://${FRONT_HOST}:3000"
      SERVER_ACTIONS_ALLOWED_ORIGINS: "${PUBLIC_HOST},${FRONT_HOST}:3000"
      NAFATH_BRIDGE_PASSWORD: "${NAFATH_BRIDGE_PASSWORD}"
      ZONE_API_URL: "http://${API_HOST}:3020"
      INTG_MODE: "mock"
    restart: unless-stopped

  # وكيل https: hemayah.pp.gov.sa ← البوابة + /supabase/ ← القاعدة
  hemaya-proxy:
    build:
      context: ../..
      dockerfile: deploy/staging/docker/proxy.Dockerfile
    depends_on:
      - hemaya-frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_HOST: "${PUBLIC_HOST}"
      DB_HOST: "${DB_HOST}"
      TLS_CERT_B64: "${TLS_CERT_B64:-}"
      TLS_KEY_B64: "${TLS_KEY_B64:-}"
    restart: unless-stopped
